<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KI-Browser — Live Viewer</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0e0f13; color: #d7dae0;
    font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    height: 100vh; display: flex; flex-direction: column;
  }
  .bar { display: flex; align-items: center; gap: 6px; padding: 6px 8px; background: #171922; border-bottom: 1px solid #262a36; flex: 0 0 auto; }
  button {
    background: #20232e; color: #d7dae0; border: 1px solid #2c3140; border-radius: 6px;
    padding: 5px 9px; cursor: pointer; font-size: 13px; line-height: 1;
  }
  button:hover { background: #2a2e3b; }
  button:active { background: #2d6cdf; }
  .nav { font-size: 15px; min-width: 32px; }
  #addr {
    flex: 1 1 auto; background: #0e0f13; color: #e8eaee; border: 1px solid #2c3140;
    border-radius: 7px; padding: 7px 11px; font-size: 13px; outline: none;
  }
  #addr:focus { border-color: #2d6cdf; }
  #status { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }
  #dot { width: 9px; height: 9px; border-radius: 50%; background: #b0451f; }
  #dot.on { background: #2faa55; } #dot.connecting { background: #c9a227; }
  #tabbar { display: flex; align-items: center; gap: 4px; padding: 4px 8px; background: #13151c; border-bottom: 1px solid #262a36; overflow-x: auto; flex: 0 0 auto; }
  .tab {
    display: flex; align-items: center; gap: 6px; padding: 5px 8px; background: #20232e;
    border: 1px solid #2c3140; border-radius: 6px 6px 0 0; white-space: nowrap;
    max-width: 220px; cursor: pointer; font-size: 12px;
  }
  .tab.active { background: #2d6cdf; border-color: #2d6cdf; color: #fff; }
  .tab .label { overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
  .tab .x { opacity: .6; font-size: 14px; padding: 0 2px; border-radius: 4px; }
  .tab .x:hover { opacity: 1; background: rgba(255,255,255,.15); }
  #newtab { font-size: 16px; padding: 3px 9px; }
  #stage { flex: 1 1 auto; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; position: relative; }
  #screen { max-width: 100%; max-height: 100%; display: block; cursor: crosshair; background: #000; }
  #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #8a909c; pointer-events: none; font-size: 14px; }
  /* Versteckte Textarea: hält den Fokus für Tastatur + Clipboard (paste-Event
     liefert das User-Clipboard auch über HTTP, execCommand('copy') ebenso). */
  #kbd {
    position: fixed; top: -100px; left: -100px; width: 60px; height: 24px;
    opacity: 0; border: 0; padding: 0; resize: none; overflow: hidden;
  }
  #ctxmenu {
    position: fixed; z-index: 50; display: none; min-width: 230px;
    background: #1b1e27; border: 1px solid #2c3140; border-radius: 8px;
    padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,.5); font-size: 13px;
  }
  .ctx-item {
    display: block; width: 100%; text-align: left; background: none;
    border: 0; border-radius: 5px; padding: 7px 10px; color: #d7dae0; cursor: pointer;
  }
  .ctx-item:hover { background: #2d6cdf; color: #fff; }
  .ctx-item[disabled] { opacity: .4; cursor: default; }
  .ctx-item[disabled]:hover { background: none; color: #d7dae0; }
  .ctx-sep { height: 1px; background: #2c3140; margin: 4px 6px; }
  #toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: #1b1e27; border: 1px solid #2c3140; color: #d7dae0;
    padding: 8px 14px; border-radius: 8px; font-size: 13px; z-index: 60;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  /* Sessions-Panel */
  #sessions-overlay {
    position: fixed; inset: 0; z-index: 70; display: none;
    background: rgba(0,0,0,.55); align-items: flex-start; justify-content: center;
  }
  #sessions-overlay.open { display: flex; }
  #sessions-panel {
    margin-top: 56px; width: 560px; max-width: calc(100vw - 24px); max-height: 80vh;
    display: flex; flex-direction: column; background: #171922;
    border: 1px solid #2c3140; border-radius: 10px; box-shadow: 0 12px 40px rgba(0,0,0,.6);
  }
  #sessions-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid #262a36; }
  #sessions-head h2 { margin: 0; font-size: 14px; font-weight: 600; flex: 1 1 auto; }
  #sessions-list { overflow-y: auto; padding: 8px; flex: 1 1 auto; }
  .session-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 11px; margin-bottom: 6px;
    background: #20232e; border: 1px solid #2c3140; border-radius: 8px;
  }
  .session-info { flex: 1 1 auto; min-width: 0; }
  .session-origin { font-weight: 600; color: #e8eaee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-meta { font-size: 11px; color: #8a909c; margin-top: 2px; }
  .session-item button { font-size: 12px; padding: 5px 10px; }
  .session-del { background: #3a1f23; border-color: #5a2a30; }
  .session-del:hover { background: #4a2429; }
  #sessions-msg { padding: 6px 14px; font-size: 12px; color: #d7706b; min-height: 0; }
  #sessions-msg:empty { display: none; }
  #sessions-empty { padding: 24px; text-align: center; color: #8a909c; }
</style>
</head>
<body>
<div class="bar">
  <button class="nav" id="back" title="Zurück">←</button>
  <button class="nav" id="fwd" title="Vorwärts">→</button>
  <button class="nav" id="reload" title="Neu laden">⟳</button>
  <button class="nav" id="upload" title="Datei an Upload-Feld der Seite anhängen">📎</button>
  <input id="filepick" type="file" style="display:none">
  <input id="addr" type="text" placeholder="URL eingeben und Enter…" spellcheck="false" autocomplete="off">
  <button class="nav" id="sessions-btn" title="Login-Sessions verwalten">🔑</button>
  <span id="status"><span id="dot" class="connecting"></span><span id="statusText">verbinde…</span></span>
</div>
<div id="sessions-overlay">
  <div id="sessions-panel">
    <div id="sessions-head">
      <h2>Login-Sessions</h2>
      <button id="sessions-refresh" title="Neu laden">⟳</button>
      <button id="sessions-close" title="Schließen">×</button>
    </div>
    <div id="sessions-msg"></div>
    <div id="sessions-list"></div>
  </div>
</div>
<div id="tabbar">
  <div id="tabs" style="display:flex;gap:4px;"></div>
  <button id="newtab" title="Neuer Tab">+</button>
</div>
<div id="stage">
  <canvas id="screen" width="1920" height="1080"></canvas>
  <div id="overlay">Warte auf erstes Bild…</div>
</div>
<textarea id="kbd" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>
<div id="ctxmenu">
  <button class="ctx-item" id="cm-open-link">Link in neuem Tab öffnen</button>
  <button class="ctx-item" id="cm-copy-link">Link-Adresse kopieren</button>
  <button class="ctx-item" id="cm-copy">Kopieren</button>
  <button class="ctx-item" id="cm-paste">Einfügen</button>
  <div class="ctx-sep"></div>
  <button class="ctx-item" id="cm-back">← Zurück</button>
  <button class="ctx-item" id="cm-fwd">→ Vorwärts</button>
  <button class="ctx-item" id="cm-reload">⟳ Neu laden</button>
  <button class="ctx-item" id="cm-copy-url">Seiten-URL kopieren</button>
</div>
<div id="toast"></div>
<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const canvas = $('screen'), ctx = canvas.getContext('2d', { alpha: false });
  const dot = $('dot'), statusText = $('statusText'), tabsEl = $('tabs'), overlay = $('overlay'), addr = $('addr');
  const kbd = $('kbd'), menu = $('ctxmenu'), toastEl = $('toast');

  let frameW = 1920, frameH = 1080;
  let ws = null, reconnectTimer = null, gotFrame = false;
  let activeTab = null, addrFocused = false;
  // Selektion/Link-Cache für Kontextmenü + Clipboard-Brücke
  let lastSelection = '', menuLink = null, menuSelection = '';
  let ctxReqId = 0, pendingMenuReq = 0;
  let toastTimer = null;

  const setStatus = (s, t) => { dot.className = s; statusText.textContent = t; };
  const send = (o) => { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); };
  const wsUrl = () => `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/viewer?codec=jpeg`;

  function toast(msg) {
    toastEl.textContent = msg; toastEl.style.opacity = '1';
    clearTimeout(toastTimer); toastTimer = setTimeout(() => { toastEl.style.opacity = '0'; }, 1600);
  }

  // Clipboard-Brücke: navigator.clipboard verlangt HTTPS — über HTTP im LAN
  // übernimmt die versteckte Textarea + execCommand (braucht eine User-Geste,
  // die haben wir: Menü-Klick bzw. Strg+C).
  function copyText(t) {
    if (!t) { toast('Nichts zum Kopieren'); return; }
    const done = () => toast('Kopiert');
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(t).then(done).catch(() => copyViaTextarea(t, done));
    } else {
      copyViaTextarea(t, done);
    }
  }
  function copyViaTextarea(t, done) {
    const old = kbd.value;
    kbd.value = t; kbd.focus({ preventScroll: true }); kbd.select();
    try { document.execCommand('copy'); done(); } catch (e) { toast('Kopieren fehlgeschlagen'); }
    kbd.value = old;
  }

  function connect() {
    setStatus('connecting', 'verbinde…');
    ws = new WebSocket(wsUrl());
    ws.binaryType = 'arraybuffer';
    ws.onopen = () => setStatus('on', 'verbunden');
    ws.onclose = () => { setStatus('', 'getrennt…'); clearTimeout(reconnectTimer); reconnectTimer = setTimeout(connect, 1000); };
    ws.onerror = () => { try { ws.close(); } catch (e) {} };
    ws.onmessage = (ev) => {
      if (typeof ev.data === 'string') return handleText(ev.data);
      const b = new Uint8Array(ev.data);
      if (b.length >= 2 && b[0] === 0x00) renderJpeg(b.subarray(1));
    };
  }

  async function renderJpeg(bytes) {
    try {
      const bmp = await createImageBitmap(new Blob([bytes], { type: 'image/jpeg' }));
      if (bmp.width !== frameW || bmp.height !== frameH) { frameW = bmp.width; frameH = bmp.height; canvas.width = frameW; canvas.height = frameH; }
      ctx.drawImage(bmp, 0, 0); bmp.close();
      if (!gotFrame) { gotFrame = true; overlay.style.display = 'none'; }
    } catch (e) {}
  }

  function handleText(text) {
    let m; try { m = JSON.parse(text); } catch (e) { return; }
    if (m.type === 'connected' || m.type === 'tab_update') {
      activeTab = m.active_tab || null;
      renderTabs(m.tabs || [], m.active_tab);
      const at = (m.tabs || []).find(t => t.id === m.active_tab);
      if (at && !addrFocused) addr.value = at.url || '';
    } else if (m.type === 'page_context') {
      if (m.selection) lastSelection = m.selection;
      if (m.request_id === pendingMenuReq && menu.style.display === 'block') {
        menuLink = m.link || null;
        menuSelection = m.selection || '';
        updateMenuItems();
      }
    } else if (m.type === 'error') setStatus('', 'Fehler: ' + (m.message || ''));
  }

  function renderTabs(tabs, active) {
    tabsEl.innerHTML = '';
    tabs.forEach(t => {
      const el = document.createElement('div');
      el.className = 'tab' + (t.id === active ? ' active' : '');
      const label = document.createElement('span');
      label.className = 'label'; label.textContent = t.title || t.url || 'Tab'; label.title = t.url || '';
      label.onclick = () => send({ type: 'set_active_tab', tab_id: t.id });
      const x = document.createElement('span');
      x.className = 'x'; x.textContent = '×';
      x.onclick = (e) => { e.stopPropagation(); send({ type: 'close_tab', tab_id: t.id }); };
      el.appendChild(label); el.appendChild(x);
      tabsEl.appendChild(el);
    });
  }

  // ---- Toolbar ----
  $('back').onclick = () => send({ type: 'go_back' });
  $('fwd').onclick = () => send({ type: 'go_forward' });
  $('reload').onclick = () => { if (addr.value) send({ type: 'navigate', url: addr.value }); };
  $('newtab').onclick = () => send({ type: 'create_tab', url: 'about:blank' });

  // ---- Sessions-Panel: verwaltet hochgeladene Login-Sessions ----
  const sessOverlay = $('sessions-overlay'), sessList = $('sessions-list'), sessMsg = $('sessions-msg');
  function sessShowError(m) { sessMsg.textContent = m || ''; }
  function fmtDate(s) { try { return new Date(s).toLocaleString(); } catch (e) { return s || ''; } }

  async function loadSessions() {
    sessShowError('');
    sessList.innerHTML = '<div id="sessions-empty">Lade…</div>';
    try {
      const r = await fetch('/login-session/list');
      if (!r.ok) { sessList.innerHTML = ''; sessShowError('Laden fehlgeschlagen (HTTP ' + r.status + ')'); return; }
      const body = await r.json();
      const items = (body && body.data) || [];
      renderSessions(items);
    } catch (e) {
      sessList.innerHTML = ''; sessShowError('Laden fehlgeschlagen: ' + e);
    }
  }

  function renderSessions(items) {
    sessList.innerHTML = '';
    if (!items.length) { sessList.innerHTML = '<div id="sessions-empty">Keine gespeicherten Sessions.</div>'; return; }
    items.forEach(it => {
      const row = document.createElement('div');
      row.className = 'session-item';
      const info = document.createElement('div');
      info.className = 'session-info';
      const origin = document.createElement('div');
      origin.className = 'session-origin'; origin.textContent = it.origin || it.id; origin.title = it.origin || '';
      const meta = document.createElement('div');
      meta.className = 'session-meta';
      meta.textContent = fmtDate(it.created_at) + ' · ' + (it.cookie_count || 0) + ' Cookies';
      info.appendChild(origin); info.appendChild(meta);
      const openBtn = document.createElement('button');
      openBtn.textContent = 'Öffnen';
      openBtn.onclick = () => openSession(it);
      const delBtn = document.createElement('button');
      delBtn.className = 'session-del'; delBtn.textContent = 'Löschen';
      delBtn.onclick = () => deleteSession(it);
      row.appendChild(info); row.appendChild(openBtn); row.appendChild(delBtn);
      sessList.appendChild(row);
    });
  }

  async function openSession(it) {
    sessShowError('');
    try {
      const r = await fetch('/tabs/new', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: it.origin, session_id: it.id }),
      });
      if (!r.ok) { sessShowError('Öffnen fehlgeschlagen (HTTP ' + r.status + ')'); return; }
      // Frame-Stream zeigt den neuen Tab automatisch; KEINE create_tab-WS senden
      // (würde einen doppelten Tab erzeugen).
      closeSessions();
      toast('Tab geöffnet');
    } catch (e) {
      sessShowError('Öffnen fehlgeschlagen: ' + e);
    }
  }

  async function deleteSession(it) {
    sessShowError('');
    try {
      const r = await fetch('/login-session/' + encodeURIComponent(it.id), { method: 'DELETE' });
      if (!r.ok) { sessShowError('Löschen fehlgeschlagen (HTTP ' + r.status + ')'); return; }
      loadSessions();
    } catch (e) {
      sessShowError('Löschen fehlgeschlagen: ' + e);
    }
  }

  function openSessions() { sessOverlay.classList.add('open'); loadSessions(); }
  function closeSessions() { sessOverlay.classList.remove('open'); }
  $('sessions-btn').onclick = () => { sessOverlay.classList.contains('open') ? closeSessions() : openSessions(); };
  $('sessions-close').onclick = closeSessions;
  $('sessions-refresh').onclick = loadSessions;
  sessOverlay.addEventListener('mousedown', (ev) => { if (ev.target === sessOverlay) closeSessions(); });

  // File upload bridge: pick a local file, POST it to /upload, the server
  // attaches it to the page's file input via CDP (no native dialog needed).
  const filepick = $('filepick');
  $('upload').onclick = () => filepick.click();
  filepick.onchange = async () => {
    const f = filepick.files[0];
    if (!f) return;
    const fd = new FormData();
    fd.append('file', f);
    if (activeTab) fd.append('tab_id', activeTab);
    const btn = $('upload');
    btn.textContent = '⏳';
    try {
      const r = await fetch('/upload', { method: 'POST', body: fd });
      btn.textContent = r.ok ? '✓' : '✗';
    } catch (e) { btn.textContent = '✗'; }
    setTimeout(() => { btn.textContent = '📎'; }, 1500);
    filepick.value = '';
  };
  addr.addEventListener('focus', () => { addrFocused = true; });
  addr.addEventListener('blur', () => { addrFocused = false; });
  addr.addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Enter') {
      let u = addr.value.trim();
      if (u && !/^[a-z]+:\/\//i.test(u) && !u.startsWith('about:')) u = 'https://' + u;
      send({ type: 'navigate', url: u });
      kbd.focus({ preventScroll: true });
    }
  });

  // ---- Kontextmenü ----
  function requestPageContext(p, forMenu) {
    ctxReqId++;
    if (forMenu) pendingMenuReq = ctxReqId;
    send({ type: 'get_page_context', x: p.x, y: p.y, request_id: ctxReqId });
  }
  function updateMenuItems() {
    $('cm-open-link').style.display = menuLink ? 'block' : 'none';
    $('cm-copy-link').style.display = menuLink ? 'block' : 'none';
    const copyBtn = $('cm-copy');
    if (menuSelection || lastSelection) copyBtn.removeAttribute('disabled');
    else copyBtn.setAttribute('disabled', '');
  }
  function openMenu(clientX, clientY) {
    menuLink = null; menuSelection = '';
    updateMenuItems();
    menu.style.display = 'block';
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    menu.style.left = Math.min(clientX, window.innerWidth - mw - 6) + 'px';
    menu.style.top = Math.min(clientY, window.innerHeight - mh - 6) + 'px';
  }
  function hideMenu() { menu.style.display = 'none'; }
  document.addEventListener('mousedown', (ev) => { if (!menu.contains(ev.target)) hideMenu(); });

  $('cm-open-link').onclick = () => { if (menuLink) { send({ type: 'create_tab', url: menuLink }); } hideMenu(); };
  $('cm-copy-link').onclick = () => { const l = menuLink; hideMenu(); copyText(l); };
  $('cm-copy').onclick = () => { const s = menuSelection || lastSelection; hideMenu(); copyText(s); };
  $('cm-paste').onclick = () => {
    hideMenu();
    if (navigator.clipboard && navigator.clipboard.readText && window.isSecureContext) {
      navigator.clipboard.readText().then(t => { if (t) { send({ type: 'type_text', text: t }); toast('Eingefügt'); } });
    } else {
      kbd.focus({ preventScroll: true });
      toast('Strg+V drücken zum Einfügen');
    }
  };
  $('cm-back').onclick = () => { send({ type: 'go_back' }); hideMenu(); };
  $('cm-fwd').onclick = () => { send({ type: 'go_forward' }); hideMenu(); };
  $('cm-reload').onclick = () => { if (addr.value) send({ type: 'navigate', url: addr.value }); hideMenu(); };
  $('cm-copy-url').onclick = () => { const u = addr.value; hideMenu(); copyText(u); };

  // ---- Maus: echtes down/move/up (Drag + Text-Selektion möglich) ----
  const clampNum = (v, min, max) => Math.max(min, Math.min(max, v));
  const toVp = (ev) => {
    const r = canvas.getBoundingClientRect();
    return {
      x: clampNum(Math.round((ev.clientX - r.left) / r.width * frameW), 0, frameW - 1),
      y: clampNum(Math.round((ev.clientY - r.top) / r.height * frameH), 0, frameH - 1),
    };
  };
  let dragging = false, dragMoved = false;

  // mouse_move: 60Hz leading+trailing — flüssig ohne Event-Flut
  let pendingMove = null, moveTimer = null;
  function flushMove() { if (pendingMove) { send({ type: 'mouse_move', x: pendingMove.x, y: pendingMove.y }); pendingMove = null; } }
  function queueMove(p) {
    pendingMove = p;
    if (!moveTimer) {
      flushMove();
      moveTimer = setTimeout(() => { moveTimer = null; flushMove(); }, 16);
    }
  }

  // wheel: Deltas akkumulieren, 60Hz flush
  let wheelAcc = null, wheelTimer = null;
  function flushWheel() { if (wheelAcc) { send({ type: 'mouse_wheel', ...wheelAcc }); wheelAcc = null; } }

  // mousemove/mouseup auf window: Drags laufen auch über den Canvas-Rand hinaus
  window.addEventListener('mousemove', (ev) => {
    if (!dragging && ev.target !== canvas) return;
    const p = toVp(ev);
    queueMove(p);
    if (dragging) dragMoved = true;
  });
  canvas.addEventListener('mousedown', (ev) => {
    hideMenu();
    kbd.focus({ preventScroll: true });
    if (ev.button === 2) return; // Rechtsklick → eigenes Kontextmenü (contextmenu-Event)
    const p = toVp(ev), detail = Math.min(ev.detail || 1, 3);
    send({ type: 'mouse_down', x: p.x, y: p.y, button: ev.button, click_count: detail });
    if (ev.button === 0) { dragging = true; dragMoved = false; }
    ev.preventDefault();
  });
  window.addEventListener('mouseup', (ev) => {
    if (ev.button === 2) return;
    if (!dragging && ev.target !== canvas) return;
    const p = toVp(ev), detail = Math.min(ev.detail || 1, 3);
    flushMove();
    send({ type: 'mouse_up', x: p.x, y: p.y, button: ev.button, click_count: detail });
    if (ev.button === 0) {
      if (dragMoved || detail >= 2) {
        // Selektion in den Cache holen (für Strg+C / Kontextmenü-Kopieren)
        requestPageContext(p, false);
      } else {
        lastSelection = ''; // einfacher Klick kollabiert die Selektion
      }
      dragging = false;
    }
  });
  canvas.addEventListener('auxclick', (ev) => ev.preventDefault());
  canvas.addEventListener('contextmenu', (ev) => {
    ev.preventDefault();
    const p = toVp(ev);
    if (ev.shiftKey) {
      // Shift+Rechtsklick: an die Seite durchreichen (Seiten mit eigenem Menü)
      send({ type: 'mouse_down', x: p.x, y: p.y, button: 2, click_count: 1 });
      send({ type: 'mouse_up', x: p.x, y: p.y, button: 2, click_count: 1 });
      return;
    }
    openMenu(ev.clientX, ev.clientY);
    requestPageContext(p, true);
  });
  canvas.addEventListener('wheel', (ev) => {
    const p = toVp(ev);
    if (!wheelAcc) wheelAcc = { x: p.x, y: p.y, delta_x: 0, delta_y: 0 };
    wheelAcc.x = p.x; wheelAcc.y = p.y;
    wheelAcc.delta_x += -ev.deltaX | 0;
    wheelAcc.delta_y += -ev.deltaY | 0;
    if (!wheelTimer) { flushWheel(); wheelTimer = setTimeout(() => { wheelTimer = null; flushWheel(); }, 16); }
    ev.preventDefault();
  }, { passive: false });

  // ---- Tastatur über die versteckte Textarea (Clipboard-fähig) ----
  const mods = (e) => { let m = 0; if (e.shiftKey) m |= 2; if (e.ctrlKey) m |= 4; if (e.altKey) m |= 8; return m; };
  kbd.addEventListener('keydown', (e) => {
    e.stopPropagation();
    const ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && e.key.toLowerCase() === 'c') {
      // Seiten-Selektion ins User-Clipboard bringen
      if (lastSelection) { e.preventDefault(); copyText(lastSelection); }
      return;
    }
    if (ctrl && e.key.toLowerCase() === 'v') {
      return; // nicht weiterleiten — der native paste-Event (unten) übernimmt
    }
    send({ type: 'key_event', event_type: 0, modifiers: mods(e), windows_key_code: e.keyCode, character: 0 });
    if (e.key && e.key.length === 1 && !ctrl && !e.altKey) {
      send({ type: 'key_event', event_type: 3, modifiers: mods(e), windows_key_code: e.keyCode, character: e.key.charCodeAt(0) });
    }
    if (['Tab', 'Backspace', ' ', 'Enter', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
  });
  kbd.addEventListener('keyup', (e) => {
    e.stopPropagation();
    const ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && (e.key.toLowerCase() === 'c' || e.key.toLowerCase() === 'v')) return;
    send({ type: 'key_event', event_type: 2, modifiers: mods(e), windows_key_code: e.keyCode, character: 0 });
  });
  // Einfügen: der native paste-Event liefert das User-Clipboard auch über HTTP
  kbd.addEventListener('paste', (e) => {
    e.preventDefault();
    const t = (e.clipboardData || window.clipboardData).getData('text');
    if (t) { send({ type: 'type_text', text: t }); toast('Eingefügt'); }
  });
  // Getipptes nicht in der Textarea ansammeln
  kbd.addEventListener('input', () => { kbd.value = ''; });

  connect();
})();
</script>
</body>
</html>
