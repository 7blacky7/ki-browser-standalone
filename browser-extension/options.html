<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ki-browser Session Grabber — Einstellungen</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 30px auto; padding: 0 16px; }
    label { display: block; font-size: 13px; margin: 14px 0 4px; font-weight: 600; }
    input { width: 100%; padding: 8px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 9px 16px; font-size: 14px; background: #2563eb; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
    .hint { font-size: 12px; color: #555; margin-top: 4px; }
    #saved { color: #047857; font-size: 13px; margin-left: 10px; }
  </style>
</head>
<body>
  <h1>ki-browser Einstellungen</h1>
  <label for="url">ki-browser Basis-URL</label>
  <input id="url" type="text" placeholder="http://localhost:8080" />
  <div class="hint">Ziel für POST /login-session/import. Ohne abschließenden Slash.</div>

  <label for="token">Bearer-Token (optional)</label>
  <input id="token" type="password" placeholder="nur falls Auth aktiviert" />
  <div class="hint">Wird als <code>Authorization: Bearer …</code> gesendet.</div>

  <div>
    <button id="save">Speichern</button>
    <span id="saved"></span>
  </div>
  <script src="browser-polyfill.js"></script>
  <script src="options.js"></script>
</body>
</html>
