<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ki-browser Session Grabber</title>
  <style>
    body { font-family: system-ui, sans-serif; width: 320px; margin: 0; padding: 14px; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    .origin { font-size: 12px; color: #444; word-break: break-all; margin-bottom: 10px; }
    button { width: 100%; padding: 10px; font-size: 14px; cursor: pointer; border: 0; border-radius: 6px; }
    .primary { background: #2563eb; color: #fff; margin-bottom: 8px; }
    .secondary { background: #e5e7eb; color: #111; }
    .row { display: flex; gap: 8px; }
    .row button { flex: 1; }
    #status { font-size: 12px; margin-top: 10px; white-space: pre-wrap; }
    .ok { color: #047857; }
    .err { color: #b91c1c; }
    a { font-size: 12px; color: #2563eb; display: inline-block; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>ki-browser Session Grabber</h1>
  <div class="origin" id="origin">…</div>
  <button class="primary" id="grab">Session sichern</button>
  <div class="row">
    <button class="secondary" id="download" disabled>Download JSON</button>
    <button class="secondary" id="send" disabled>An ki-browser senden</button>
  </div>
  <div id="status"></div>
  <a href="#" id="open-options">Einstellungen (URL / Token)</a>
  <script src="browser-polyfill.js"></script>
  <script src="grab.js"></script>
  <script src="popup.js"></script>
</body>
</html>
