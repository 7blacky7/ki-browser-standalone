# Ki-Browser Configuration File
# =============================
# Copy this file to config.toml and customize as needed.
# All settings can also be overridden via environment variables
# (prefixed with KI_BROWSER_) or command-line arguments.

# =============================================================================
# Window Settings
# =============================================================================

# Browser window width in pixels (100-7680)
# Default: 1280
window_width = 1280

# Browser window height in pixels (100-4320)
# Default: 720
window_height = 720

# Run browser in headless mode (no visible window)
# Useful for server environments and automated testing
# Default: false
headless = false

# =============================================================================
# API Server Settings
# =============================================================================

# Enable the HTTP REST API server
# Default: true
api_enabled = true

# Port for the HTTP API server (1-65535)
# Default: 9222
api_port = 9222

# IP address the API server binds to.
# "0.0.0.0" = reachable from the whole LAN (default, current behaviour).
# "127.0.0.1" = localhost only — combine with a reverse proxy for external access.
# Can also be set via KI_BROWSER_API_BIND.
# Default: "0.0.0.0"
api_bind = "0.0.0.0"

# Optional Bearer token for API authentication (access protection).
# When UNSET (default), the API is open — exactly today's behaviour.
# When set, all routes except /health, /status, /api-doc and /swagger-ui
# require the header:  Authorization: Bearer <token>
# Strongly recommended when api_bind is "0.0.0.0" / the server is exposed.
# Can also be set via KI_BROWSER_API_TOKEN.
# api_token = "change-me-to-a-long-random-secret"

# =============================================================================
# Browser Behavior
# =============================================================================

# Maximum number of concurrent tabs allowed (1-100)
# Prevents resource exhaustion from too many open tabs
# Default: 10
max_tabs = 10

# Default timeout for operations in milliseconds (1000-300000)
# Applies to navigation, element waits, and script execution
# Default: 30000 (30 seconds)
default_timeout_ms = 30000

# Default per-command IPC timeout in seconds.
# This is the deadline for a single command sent to the browser core when the
# command does not carry its own explicit timeout. Lowered from the historical
# 30s to 10s so that a stalled CEF message loop surfaces failures (504) faster
# instead of blocking clients for half a minute. Long-running commands such as
# WaitForElement / EvaluateScript pass their own timeout and are NOT affected.
# Can also be set via KI_BROWSER_IPC_TIMEOUT_SECS.
# Default: 10
ipc_timeout_secs = 10

# =============================================================================
# Self-Recovery Watchdog (container deployments only)
# =============================================================================
# Optional safety net for the single-process CEF engine: if the browser core
# becomes saturated/stuck, IPC commands start timing out. The watchdog counts
# those timeouts over a sliding window and, past a threshold, restarts the
# process via exit(1) — relying on Docker `--restart unless-stopped` to bring
# the container back. Encrypted sessions under /app/data survive the restart.
#
# DEFAULT OFF. Without watchdog_enabled = true (or KI_BROWSER_WATCHDOG=1) the
# watchdog task is never spawned and behaviour is identical to before — there
# is NO way for the process to self-exit. Enable ONLY in a container that has a
# working restart policy; with no restart policy, a fired watchdog means a
# total outage instead of recovery.
#
# watchdog_enabled = false            # KI_BROWSER_WATCHDOG = 1/true
# watchdog_max_timeouts = 4           # KI_BROWSER_WATCHDOG_MAX_TIMEOUTS
# watchdog_window_secs = 30           # KI_BROWSER_WATCHDOG_WINDOW_SECS
# watchdog_min_uptime_secs = 60       # KI_BROWSER_WATCHDOG_MIN_UPTIME_SECS

# =============================================================================
# Stealth Mode
# =============================================================================

# Enable stealth mode to avoid bot detection
# When enabled, applies fingerprint spoofing, navigator overrides,
# and human-like behavior patterns
# Default: false
stealth_mode = false

# Real GPU WebGL via native EGL (environment variable only, no toml key):
#   KI_BROWSER_USE_EGL=1  (or "true")
# Makes CEF start with --use-gl=egl so the real GPU (e.g. NVIDIA with
# --runtime=nvidia in Docker) backs WebGL instead of software GL (llvmpipe)
# under Xvfb. EXPERIMENTAL: may break rendering on hosts without a working
# EGL stack — default is OFF. The spoofed WebGL identity (vendor/renderer
# strings per tab) stays active regardless of this switch.

# =============================================================================
# User Agent
# =============================================================================

# Custom user agent string (optional)
# Leave commented to use default browser user agent
# When stealth_mode is enabled, this may be overridden by fingerprint settings
# user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# =============================================================================
# Profile Persistence
# =============================================================================

# Path to browser profile directory for persistent storage (optional)
# Stores cookies, local storage, cache, and session data
# If not set, uses a temporary profile that is cleared on exit
# profile_path = "./profiles/default"

# =============================================================================
# Proxy Configuration (Optional)
# =============================================================================
# Uncomment and configure to route browser traffic through a proxy server

# [proxy]
# Proxy server hostname or IP address
# host = "proxy.example.com"

# Proxy server port
# port = 8080

# Proxy type: "http", "https", or "socks5"
# Default: "http"
# proxy_type = "http"

# Proxy authentication credentials (optional)
# username = "proxy_user"
# password = "proxy_password"

# =============================================================================
# Example Configurations
# =============================================================================

# --- Headless Server Configuration ---
# Uncomment for running on a server without display
#
# headless = true
# window_width = 1920
# window_height = 1080
# api_port = 9222
# stealth_mode = true
# max_tabs = 20
# default_timeout_ms = 60000

# --- Development Configuration ---
# Uncomment for local development and testing
#
# headless = false
# window_width = 1280
# window_height = 720
# api_port = 9222
# stealth_mode = false
# max_tabs = 5
# default_timeout_ms = 30000

# --- High-Performance Scraping Configuration ---
# Uncomment for web scraping workloads
#
# headless = true
# window_width = 1920
# window_height = 1080
# api_port = 9222
# stealth_mode = true
# max_tabs = 50
# default_timeout_ms = 45000
# profile_path = "./profiles/scraper"
#
# [proxy]
# host = "residential-proxy.example.com"
# port = 8080
# proxy_type = "http"
# username = "scraper_user"
# password = "secure_password"

# --- SOCKS5 Proxy Example ---
# Uncomment to use a SOCKS5 proxy (e.g., Tor, SSH tunnel)
#
# [proxy]
# host = "127.0.0.1"
# port = 9050
# proxy_type = "socks5"
